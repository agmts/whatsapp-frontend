<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WhatsApp Dashboard - With Escalation System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: #0F1419;
            color: #E8E4DF;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        .login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            background: linear-gradient(135deg, #0F1419 0%, #1A1F2E 100%);
        }

        .login-box {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            background-color: #1A1F2E;
            border-radius: 12px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 3rem;
            height: 3rem;
            border-radius: 8px;
            background-color: rgba(212, 175, 55, 0.1);
            margin-bottom: 1rem;
        }

        .logo-dot {
            width: 1.5rem;
            height: 1.5rem;
            background-color: #D4AF37;
            border-radius: 50%;
        }

        .login-header h1 {
            font-size: 1.875rem;
            font-weight: bold;
            color: #E8E4DF;
            margin-bottom: 0.5rem;
        }

        .login-header p {
            font-size: 0.875rem;
            color: #A8A39E;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: #E8E4DF;
            margin-bottom: 0.5rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem;
            background-color: #1A1F2E;
            border: 1px solid #2A3142;
            border-radius: 6px;
            color: #E8E4DF;
            font-size: 0.875rem;
            box-sizing: border-box;
        }

        .form-group input:focus {
            outline: none;
            border-color: #D4AF37;
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
        }

        .login-button {
            width: 100%;
            padding: 0.75rem;
            background-color: #D4AF37;
            color: #0F1419;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .login-button:hover {
            background-color: #E5C158;
        }

        .login-button:active {
            transform: scale(0.98);
        }

        .hint {
            text-align: center;
            font-size: 0.75rem;
            color: #A8A39E;
            margin-top: 1rem;
        }

        .sidebar {
            width: 280px;
            background-color: #1A1F2E;
            border-right: 1px solid #2A3142;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 1rem;
            border-bottom: 1px solid #2A3142;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-header h2 {
            font-size: 1rem;
            font-weight: 600;
            color: #E8E4DF;
            margin: 0;
        }

        .logout-button {
            padding: 0.5rem 1rem;
            background-color: #D4AF37;
            color: #0F1419;
            border: none;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .logout-button:hover {
            background-color: #E5C158;
        }

        .conversations-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }

        .conversation-item {
            width: 100%;
            padding: 0.75rem;
            margin-bottom: 0.5rem;
            background-color: transparent;
            border: 1px solid #2A3142;
            border-radius: 6px;
            color: #E8E4DF;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
            position: relative;
        }

        .conversation-item:hover {
            background-color: rgba(212, 175, 55, 0.1);
        }

        .conversation-item.active {
            background-color: #D4AF37;
            color: #0F1419;
        }

        /* ESCALATION STYLES */
        .conversation-item.escalated {
            border-color: #FF4444;
            background-color: rgba(255, 68, 68, 0.1);
            animation: pulse-red 2s infinite;
        }

        .conversation-item.escalated:hover {
            background-color: rgba(255, 68, 68, 0.2);
        }

        .escalation-badge {
            display: inline-block;
            background-color: #FF4444;
            color: white;
            font-size: 0.65rem;
            padding: 0.25rem 0.5rem;
            border-radius: 3px;
            margin-left: 0.5rem;
            font-weight: bold;
        }

        @keyframes pulse-red {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 68, 68, 0.7); }
            50% { box-shadow: 0 0 0 8px rgba(255, 68, 68, 0); }
        }

        .conversation-sender {
            font-size: 0.875rem;
            font-weight: 500;
        }

        .conversation-preview {
            font-size: 0.75rem;
            opacity: 0.7;
            margin-top: 0.25rem;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #0F1419;
        }

        .chat-header {
            padding: 1rem;
            border-bottom: 1px solid #2A3142;
            background-color: #1A1F2E;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h2 {
            font-size: 1.125rem;
            font-weight: 600;
            color: #E8E4DF;
            margin: 0;
        }

        .escalation-controls {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .escalation-timer {
            font-size: 0.75rem;
            color: #FF4444;
            font-weight: bold;
        }

        .takeover-button {
            padding: 0.5rem 1rem;
            background-color: #FF4444;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .takeover-button:hover {
            background-color: #FF6666;
        }

        .takeover-button:active {
            transform: scale(0.98);
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .message {
            display: flex;
            max-width: 70%;
        }

        .message.user {
            align-self: flex-end;
        }

        .message.bot {
            align-self: flex-start;
        }

        .message-bubble {
            padding: 0.75rem;
            border-radius: 6px;
            font-size: 0.875rem;
        }

        .message.user .message-bubble {
            background-color: #D4AF37;
            color: #0F1419;
        }

        .message.bot .message-bubble {
            background-color: #2A3142;
            color: #E8E4DF;
        }

        .message.escalation-alert .message-bubble {
            background-color: #FF4444;
            color: white;
            font-weight: bold;
        }

        .empty-state {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #A89968;
            text-align: center;
        }

        .input-area {
            padding: 1rem;
            border-top: 1px solid #2A3142;
            background-color: #1A1F2E;
            display: flex;
            gap: 0.5rem;
        }

        .input-area input {
            flex: 1;
            padding: 0.75rem;
            background-color: #0F1419;
            border: 1px solid #2A3142;
            border-radius: 6px;
            color: #E8E4DF;
            font-size: 0.875rem;
        }

        .input-area input:focus {
            outline: none;
            border-color: #D4AF37;
        }

        .send-button {
            padding: 0.75rem 1.5rem;
            background-color: #D4AF37;
            color: #0F1419;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .send-button:hover {
            background-color: #E5C158;
        }

        .send-button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <!-- Login Screen -->
        <div class="login-screen" id="loginScreen">
            <div class="login-box">
                <div class="login-header">
                    <div class="logo">
                        <div class="logo-dot"></div>
                    </div>
                    <h1>WhatsApp Dashboard</h1>
                    <p>Team Management System</p>
                </div>
                <form id="loginForm">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" placeholder="admin" required />
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="••••••••" required />
                    </div>
                    <button type="submit" class="login-button">Login</button>
                    <div class="hint">Use: admin / CamelDelvey</div>
                </form>
            </div>
        </div>

        <!-- Dashboard -->
        <div id="dashboard" style="display: none; flex: 1; display: flex;">
            <!-- Sidebar -->
            <div class="sidebar">
                <div class="sidebar-header">
                    <h2>Conversations</h2>
                    <button class="logout-button" onclick="logout()">Logout</button>
                </div>
                <div class="conversations-list" id="conversationsList"></div>
            </div>

            <!-- Main Content -->
            <div class="main-content">
                <!-- Chat Header -->
                <div class="chat-header">
                    <h2 id="chatHeaderTitle">Select a conversation</h2>
                    <div class="escalation-controls" id="escalationControls" style="display: none;">
                        <span class="escalation-timer" id="escalationTimer"></span>
                        <button class="takeover-button" onclick="takeoverEscalation()">Take Over</button>
                    </div>
                </div>

                <!-- Messages Area -->
                <div class="messages-area" id="messagesArea">
                    <div class="empty-state">Select a conversation to view messages</div>
                </div>

                <!-- Input Area -->
                <div class="input-area" id="inputArea" style="display: none;">
                    <input type="text" id="messageInput" placeholder="Type a message..." />
                    <button class="send-button" onclick="sendMessage()">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Demo data with escalation support
        const demoConversations = [
            {
                id: 1,
                sender: '+1-555-0101',
                messages: [
                    { sender: 'user', content: 'Hi, how are you doing?' },
                    { sender: 'bot', content: 'I\'m doing great! How about you?' },
                    { sender: 'user', content: 'Pretty good, just working on some projects' }
                ],
                escalated: false,
                escalationTime: null
            },
            {
                id: 2,
                sender: '+1-555-0102',
                messages: [
                    { sender: 'user', content: 'Can you help me with this?' },
                    { sender: 'bot', content: 'Of course! What do you need help with?' },
                    { sender: 'user', content: 'I need to speak to a human agent' }
                ],
                escalated: true,
                escalationTime: Date.now()
            },
            {
                id: 3,
                sender: '+1-555-0103',
                messages: [
                    { sender: 'user', content: 'Thanks for your help!' },
                    { sender: 'bot', content: 'You\'re welcome! Happy to assist.' }
                ],
                escalated: false,
                escalationTime: null
            },
            {
                id: 4,
                sender: '+1-555-0104',
                messages: [
                    { sender: 'user', content: 'See you tomorrow' },
                    { sender: 'bot', content: 'Sounds good! Have a great day!' }
                ],
                escalated: false,
                escalationTime: null
            }
        ];

        let currentConversation = null;
        let isLoggedIn = false;
        let escalationAudioPlaying = false;

        // Login handler
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (username === 'admin' && password === 'CamelDelvey') {
                isLoggedIn = true;
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'flex';
                loadConversations();
                startEscalationMonitor();
            } else {
                alert('Invalid credentials');
            }
        });

        function loadConversations() {
            const list = document.getElementById('conversationsList');
            list.innerHTML = '';

            demoConversations.forEach((conv) => {
                const item = document.createElement('button');
                item.className = 'conversation-item' + (conv.escalated ? ' escalated' : '');
                item.onclick = () => selectConversation(conv.id);

                const lastMsg = conv.messages[conv.messages.length - 1];
                let html = `
                    <div class="conversation-sender">
                        ${conv.sender}
                        ${conv.escalated ? '<span class="escalation-badge">🚨 ESCALATED</span>' : ''}
                    </div>
                    <div class="conversation-preview">${lastMsg.content}</div>
                `;
                item.innerHTML = html;
                list.appendChild(item);
            });
        }

        function selectConversation(id) {
            currentConversation = demoConversations.find(c => c.id === id);
            
            // Update header
            document.getElementById('chatHeaderTitle').textContent = currentConversation.sender;

            // Show/hide escalation controls
            if (currentConversation.escalated) {
                document.getElementById('escalationControls').style.display = 'flex';
                playEscalationAlert();
            } else {
                document.getElementById('escalationControls').style.display = 'none';
            }

            // Load messages
            const messagesArea = document.getElementById('messagesArea');
            messagesArea.innerHTML = '';

            if (currentConversation.escalated) {
                const alertMsg = document.createElement('div');
                alertMsg.className = 'message escalation-alert';
                alertMsg.innerHTML = '<div class="message-bubble">🚨 ESCALATION ALERT: Customer requesting human support</div>';
                messagesArea.appendChild(alertMsg);
            }

            currentConversation.messages.forEach((msg) => {
                const msgDiv = document.createElement('div');
                msgDiv.className = 'message ' + msg.sender;
                msgDiv.innerHTML = `<div class="message-bubble">${msg.content}</div>`;
                messagesArea.appendChild(msgDiv);
            });

            document.getElementById('inputArea').style.display = 'flex';
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();

            if (!content || !currentConversation) return;

            // Add user message
            currentConversation.messages.push({ sender: 'user', content });

            // Add bot response
            setTimeout(() => {
                currentConversation.messages.push({
                    sender: 'bot',
                    content: 'Thanks for your message! We\'ll get back to you soon.'
                });
                selectConversation(currentConversation.id);
            }, 500);

            input.value = '';
            selectConversation(currentConversation.id);
        }

        function takeoverEscalation() {
            if (!currentConversation) return;

            currentConversation.escalated = false;
            currentConversation.escalationTime = null;

            // Add system message
            currentConversation.messages.push({
                sender: 'bot',
                content: 'A team member has taken over this conversation.'
            });

            loadConversations();
            selectConversation(currentConversation.id);
            alert('You have taken over this conversation!');
        }

        function playEscalationAlert() {
            if (escalationAudioPlaying) return;

            escalationAudioPlaying = true;
            // Create a simple beep sound using Web Audio API
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.frequency.value = 800;
            oscillator.type = 'sine';

            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.5);

            setTimeout(() => { escalationAudioPlaying = false; }, 500);
        }

        function startEscalationMonitor() {
            setInterval(() => {
                demoConversations.forEach((conv) => {
                    if (conv.escalated && conv.escalationTime) {
                        const elapsed = (Date.now() - conv.escalationTime) / 1000;
                        if (currentConversation && currentConversation.id === conv.id) {
                            const remaining = Math.max(0, 45 - elapsed);
                            document.getElementById('escalationTimer').textContent = `${Math.ceil(remaining)}s`;

                            if (remaining === 0 && conv.escalated) {
                                conv.escalated = false;
                                alert('Escalation timeout: No agent available. Customer notified.');
                                loadConversations();
                            }
                        }

                        // Play alert every 5 seconds
                        if (Math.floor(elapsed) % 5 === 0 && Math.floor(elapsed) > 0) {
                            playEscalationAlert();
                        }
                    }
                });
            }, 1000);
        }

        function logout() {
            isLoggedIn = false;
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('loginForm').reset();
            currentConversation = null;
        }
    </script>
</body>
</html>
