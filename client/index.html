<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WhatsApp Dashboard - Test</title>
    <style>
        body {
            margin: 0;
            padding: 2rem;
            background-color: #0F1419;
            color: #E8E4DF;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
        }
        h1 {
            margin: 0 0 1rem 0;
            font-size: 2rem;
        }
        p {
            margin: 0.5rem 0;
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>WhatsApp Dashboard</h1>
        <p id="status">Loading...</p>
    </div>
    
    <script>
        console.log('Inline script executed!');
        document.getElementById('status').textContent = 'JavaScript is working!';
    </script>
    
    <div id="root"></div>
    <script type="module">
        import('/src/main.tsx').then(() => {
            console.log('Module loaded successfully');
        }).catch((err) => {
            console.error('Module loading error:', err);
            document.getElementById('status').textContent = 'Module Error: ' + err.message;
        });
    </script>
    <script>
        window.addEventListener('error', (e) => {
            console.error('Global error:', e.error);
            document.getElementById('status').textContent = 'Error: ' + (e.error?.message || e.message);
        });
        window.addEventListener('unhandledrejection', (e) => {
            console.error('Unhandled rejection:', e.reason);
            document.getElementById('status').textContent = 'Error: ' + (e.reason?.message || e.reason);
        });
    </script>
</body>
</html>
