<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WhatsApp Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: #0F1419;
            color: #E8E4DF;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        .login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            background: linear-gradient(135deg, #0F1419 0%, #1A1F2E 100%);
        }

        .login-box {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            background-color: #1A1F2E;
            border-radius: 12px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 3rem;
            height: 3rem;
            border-radius: 8px;
            background-color: rgba(212, 175, 55, 0.1);
            margin-bottom: 1rem;
        }

        .logo-dot {
            width: 1.5rem;
            height: 1.5rem;
            background-color: #D4AF37;
            border-radius: 50%;
        }

        .login-header h1 {
            font-size: 1.875rem;
            font-weight: bold;
            color: #E8E4DF;
            margin-bottom: 0.5rem;
        }

        .login-header p {
            font-size: 0.875rem;
            color: #A8A39E;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: #E8E4DF;
            margin-bottom: 0.5rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem;
            background-color: #1A1F2E;
            border: 1px solid #2A3142;
            border-radius: 6px;
            color: #E8E4DF;
            font-size: 0.875rem;
            box-sizing: border-box;
        }

        .form-group input:focus {
            outline: none;
            border-color: #D4AF37;
        }

        .login-btn {
            width: 100%;
            padding: 0.75rem;
            background-color: #D4AF37;
            color: #0F1419;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 200ms ease-out;
        }

        .login-btn:hover {
            background-color: #C9A961;
        }

        .login-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .error-message {
            padding: 0.75rem;
            background-color: #8B3A3A;
            border-radius: 6px;
            color: #FFB3B3;
            font-size: 0.875rem;
            text-align: center;
            margin-bottom: 1rem;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .hint {
            font-size: 0.75rem;
            color: #A8A39E;
            text-align: center;
            margin-top: 1.5rem;
        }

        .dashboard {
            display: none;
            flex: 1;
            flex-direction: column;
        }

        .dashboard.show {
            display: flex;
        }

        .sidebar {
            width: 300px;
            background-color: #1A1F2E;
            border-right: 1px solid #2A3142;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 1rem;
            border-bottom: 1px solid #2A3142;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-header h2 {
            font-size: 1.25rem;
            font-weight: bold;
            color: #E8E4DF;
            margin: 0;
        }

        .logout-btn {
            padding: 0.5rem;
            background-color: transparent;
            border: none;
            color: #A89968;
            cursor: pointer;
            font-size: 0.875rem;
        }

        .conversations-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }

        .conversation-item {
            width: 100%;
            padding: 0.75rem;
            margin-bottom: 0.5rem;
            background-color: transparent;
            border: 1px solid #2A3142;
            border-radius: 6px;
            color: #E8E4DF;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
        }

        .conversation-item:hover {
            background-color: rgba(212, 175, 55, 0.1);
        }

        .conversation-item.active {
            background-color: #D4AF37;
            color: #0F1419;
        }

        .conversation-sender {
            font-size: 0.875rem;
            font-weight: 500;
        }

        .conversation-preview {
            font-size: 0.75rem;
            opacity: 0.7;
            margin-top: 0.25rem;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #0F1419;
        }

        .chat-header {
            padding: 1rem;
            border-bottom: 1px solid #2A3142;
            background-color: #1A1F2E;
        }

        .chat-header h2 {
            font-size: 1.125rem;
            font-weight: 600;
            color: #E8E4DF;
            margin: 0;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .message {
            display: flex;
            max-width: 70%;
        }

        .message.user {
            align-self: flex-end;
        }

        .message.bot {
            align-self: flex-start;
        }

        .message-bubble {
            padding: 0.75rem;
            border-radius: 6px;
            font-size: 0.875rem;
        }

        .message.user .message-bubble {
            background-color: #D4AF37;
            color: #0F1419;
        }

        .message.bot .message-bubble {
            background-color: #2A3142;
            color: #E8E4DF;
        }

        .empty-state {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #A89968;
            text-align: center;
        }

        .input-area {
            padding: 1rem;
            border-top: 1px solid #2A3142;
            background-color: #1A1F2E;
            display: flex;
            gap: 0.5rem;
        }

        .input-area input {
            flex: 1;
            padding: 0.75rem;
            background-color: #0F1419;
            border: 1px solid #2A3142;
            border-radius: 6px;
            color: #E8E4DF;
            font-size: 0.875rem;
        }

        .input-area input:focus {
            outline: none;
            border-color: #D4AF37;
        }

        .send-btn {
            padding: 0.75rem 1rem;
            background-color: #D4AF37;
            color: #0F1419;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
        }

        .send-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Login Screen -->
        <div class="login-screen" id="loginScreen">
            <div class="login-box">
                <div class="login-header">
                    <div class="logo">
                        <div class="logo-dot"></div>
                    </div>
                    <h1>WhatsApp Dashboard</h1>
                    <p>Premium Monitoring & Management</p>
                </div>

                <div class="error-message" id="errorMessage"></div>

                <form id="loginForm">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" placeholder="Enter username" value="admin" required />
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="Enter password" required />
                    </div>

                    <button type="submit" class="login-btn" id="loginBtn">Login</button>
                </form>

                <p class="hint">Use: admin / CamelDelvey</p>
            </div>
        </div>

        <!-- Dashboard -->
        <div class="dashboard" id="dashboard">
            <div class="sidebar">
                <div class="sidebar-header">
                    <h2>Conversations</h2>
                    <button class="logout-btn" id="logoutBtn">Logout</button>
                </div>
                <div class="conversations-list" id="conversationsList"></div>
            </div>

            <div class="main-content">
                <div class="chat-header" id="chatHeader">
                    <h2>Select a conversation</h2>
                </div>

                <div class="messages-area" id="messagesArea">
                    <div class="empty-state">Select a conversation to view messages</div>
                </div>

                <div class="input-area" id="inputArea" style="display: none;">
                    <input type="text" id="messageInput" placeholder="Type a message..." />
                    <button class="send-btn" id="sendBtn">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://web-production-0a1b2.up.railway.app';

        // DOM Elements
        const loginScreen = document.getElementById('loginScreen');
        const dashboard = document.getElementById('dashboard');
        const loginForm = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');
        const logoutBtn = document.getElementById('logoutBtn');
        const conversationsList = document.getElementById('conversationsList');
        const messagesArea = document.getElementById('messagesArea');
        const chatHeader = document.getElementById('chatHeader');
        const inputArea = document.getElementById('inputArea');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');

        let currentToken = null;
        let selectedConversation = null;

        // Check if user is already logged in
        window.addEventListener('load', () => {
            const token = localStorage.getItem('token');
            if (token) {
                currentToken = token;
                showDashboard();
                loadConversations();
            }
        });

        // Login
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            // For demo purposes, accept any non-empty credentials
            if (username && password) {
                // Create a demo token
                currentToken = 'demo-token-' + Date.now();
                localStorage.setItem('token', currentToken);
                showDashboard();
                loadConversations();
            } else {
                showError('Please enter username and password');
            }
        })

        // Logout
        logoutBtn.addEventListener('click', () => {
            localStorage.removeItem('token');
            currentToken = null;
            selectedConversation = null;
            loginScreen.style.display = 'flex';
            dashboard.classList.remove('show');
            document.getElementById('username').value = 'admin';
            document.getElementById('password').value = '';
        });

        // Demo conversations
        const demoConversations = [
            { id: 1, sender_id: '+1-555-0101', last_message: 'Hi, how are you doing?' },
            { id: 2, sender_id: '+1-555-0102', last_message: 'Can you help me with this?' },
            { id: 3, sender_id: '+1-555-0103', last_message: 'Thanks for your help!' },
            { id: 4, sender_id: '+1-555-0104', last_message: 'See you tomorrow' },
        ];

        // Demo messages
        const demoMessages = {
            1: [
                { id: 1, content: 'Hi, how are you doing?', message_type: 'human' },
                { id: 2, content: 'I\'m doing great! How about you?', message_type: 'bot' },
                { id: 3, content: 'Pretty good, just working on some projects', message_type: 'human' },
            ],
            2: [
                { id: 1, content: 'Can you help me with this?', message_type: 'human' },
                { id: 2, content: 'Of course! What do you need help with?', message_type: 'bot' },
                { id: 3, content: 'I need to understand how to use the dashboard', message_type: 'human' },
                { id: 4, content: 'Sure! The dashboard shows all your conversations on the left, and you can select any to view the messages here.', message_type: 'bot' },
            ],
            3: [
                { id: 1, content: 'Thanks for your help!', message_type: 'human' },
                { id: 2, content: 'You\'re welcome! Happy to help.', message_type: 'bot' },
            ],
            4: [
                { id: 1, content: 'See you tomorrow', message_type: 'human' },
                { id: 2, content: 'See you then!', message_type: 'bot' },
            ],
        };

        // Load conversations
        async function loadConversations() {
            try {
                const response = await fetch(`${API_URL}/api/conversations`, {
                    headers: { 'Authorization': `Bearer ${currentToken}` },
                });

                if (response.ok) {
                    const conversations = await response.json();
                    renderConversations(conversations);
                } else {
                    // Use demo data if API fails
                    renderConversations(demoConversations);
                }
            } catch (err) {
                console.error('Error loading conversations:', err);
                // Use demo data on error
                renderConversations(demoConversations);
            }
        }

        // Render conversations
        function renderConversations(conversations) {
            conversationsList.innerHTML = '';
            if (conversations.length === 0) {
                conversationsList.innerHTML = '<div style="text-align: center; padding: 2rem; color: #A89968;">No conversations</div>';
                return;
            }

            conversations.forEach(conv => {
                const button = document.createElement('button');
                button.className = 'conversation-item';
                if (selectedConversation?.id === conv.id) {
                    button.classList.add('active');
                }
                button.innerHTML = `
                    <div class="conversation-sender">${conv.sender_id}</div>
                    <div class="conversation-preview">${conv.last_message || 'No messages'}</div>
                `;
                button.addEventListener('click', () => selectConversation(conv));
                conversationsList.appendChild(button);
            });
        }

        // Select conversation
        function selectConversation(conversation) {
            selectedConversation = conversation;
            chatHeader.innerHTML = `<h2>${conversation.sender_id}</h2>`;
            inputArea.style.display = 'flex';
            messagesArea.innerHTML = '<div style="text-align: center; padding: 2rem; color: #A89968;">Loading messages...</div>';
            loadMessages();
        }

        // Load messages
        async function loadMessages() {
            if (!selectedConversation) return;

            try {
                const response = await fetch(`${API_URL}/api/conversations/${selectedConversation.id}`, {
                    headers: { 'Authorization': `Bearer ${currentToken}` },
                });

                if (response.ok) {
                    const data = await response.json();
                    renderMessages(data.messages || []);
                } else {
                    // Use demo data if API fails
                    renderMessages(demoMessages[selectedConversation.id] || []);
                }
            } catch (err) {
                console.error('Error loading messages:', err);
                // Use demo data on error
                renderMessages(demoMessages[selectedConversation.id] || []);
            }
        }

        // Render messages
        function renderMessages(messages) {
            messagesArea.innerHTML = '';
            if (messages.length === 0) {
                messagesArea.innerHTML = '<div style="text-align: center; padding: 2rem; color: #A89968;">No messages yet</div>';
                return;
            }

            messages.forEach(msg => {
                const msgDiv = document.createElement('div');
                msgDiv.className = `message ${msg.message_type === 'human' ? 'user' : 'bot'}`;
                msgDiv.innerHTML = `<div class="message-bubble">${msg.content}</div>`;
                messagesArea.appendChild(msgDiv);
            });

            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        // Send message
        sendBtn.addEventListener('click', async () => {
            const content = messageInput.value.trim();
            if (!content || !selectedConversation) return;

            try {
                const response = await fetch(`${API_URL}/api/conversations/${selectedConversation.id}/messages`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${currentToken}`,
                    },
                    body: JSON.stringify({ content }),
                });

                if (response.ok) {
                    messageInput.value = '';
                    loadMessages();
                }
            } catch (err) {
                console.error('Error sending message:', err);
            }
        });

        // Show error
        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
            setTimeout(() => {
                errorMessage.classList.remove('show');
            }, 5000);
        }

        // Show dashboard
        function showDashboard() {
            loginScreen.style.display = 'none';
            dashboard.classList.add('show');
        }

        // Poll conversations every 4 seconds
        setInterval(() => {
            if (currentToken) {
                loadConversations();
            }
        }, 4000);
    </script>
</body>
</html>
